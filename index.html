<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="nav-logo" onclick="showPage('listing')">
    <i class="ti ti-shopping-bag"></i> ShopEase
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:#888" id="nav-count"></span>
    <button class="cart-btn" onclick="showPage('cart')">
      <i class="ti ti-shopping-cart"></i>
      Cart
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
</nav>

<!-- LISTING PAGE -->
<div class="page active" id="page-listing">
  <div class="page-header">
    <h1>All Products</h1>
    <p id="product-count">Loading products…</p>
  </div>
  <div class="search-bar">
    <input type="text" placeholder="Search products…" id="search-input" oninput="filterProducts()">
    <select id="category-filter" onchange="filterProducts()">
      <option value="">All categories</option>
    </select>
    <select id="sort-filter" onchange="filterProducts()">
      <option value="">Sort by</option>
      <option value="price-asc">Price: low to high</option>
      <option value="price-desc">Price: high to low</option>
      <option value="rating">Top rated</option>
      <option value="discount">Best discount</option>
    </select>
  </div>
  <div class="products-grid" id="products-grid">
    <div class="loading">Loading products…</div>
  </div>
</div>

<!-- PRODUCT DETAIL PAGE -->
<div class="page" id="page-product">
  <button class="back-btn" onclick="showPage('listing')">
    <i class="ti ti-arrow-left"></i> Back to products
  </button>
  <div id="product-detail-content"></div>
</div>

<!-- CART PAGE -->
<div class="page" id="page-cart">
  <div class="page-header">
    <h1>Your cart</h1>
  </div>
  <div class="cart-layout">
    <div>
      <div class="cart-items-section">
        <h2 id="cart-items-title">Cart items</h2>
        <div id="cart-items-list"></div>
      </div>
    </div>
    <div>
      <div class="bill-card">
        <h2>Bill summary</h2>
        <div class="bill-row"><span>Subtotal (MRP)</span><span id="bill-subtotal">$0.00</span></div>
        <div class="bill-row discount"><span>Discount on MRP</span><span id="bill-discount">-$0.00</span></div>
        <div class="bill-row"><span>Delivery charges</span><span id="bill-delivery">FREE</span></div>
        <div class="bill-row total"><span>Total amount</span><span id="bill-total">$0.00</span></div>
        <button class="checkout-btn" id="checkout-btn" disabled onclick="checkout()">Proceed to checkout</button>
        <p class="free-delivery-note" id="delivery-note"></p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  Made with ❤️ by Dakshita Rai
</footer>

<script src="script.js"></script>
</body>
</html>
