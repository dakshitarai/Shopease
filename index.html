<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

/* NAV */
.nav { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-size: 18px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #1a1a1a; }
.nav-logo i { color: #2563eb; }
.cart-btn { position: relative; background: none; border: 1px solid #e5e5e5; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; color: #1a1a1a; transition: background 0.15s; }
.cart-btn:hover { background: #f5f5f5; }
.cart-badge { background: #2563eb; color: #fff; font-size: 11px; font-weight: 600; border-radius: 999px; padding: 1px 7px; min-width: 20px; text-align: center; }

/* PAGES */
.page { display: none; padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
.page.active { display: block; }

/* LISTING */
.page-header { margin-bottom: 1.5rem; }
.page-header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.page-header p { color: #666; font-size: 14px; }
.search-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.search-bar input, .search-bar select { padding: 8px 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; outline: none; }
.search-bar input { flex: 1; min-width: 200px; }
.search-bar input:focus, .search-bar select:focus { border-color: #2563eb; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.product-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s; }
.product-card:hover { border-color: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(37,99,235,0.1); }
.product-img { width: 100%; height: 160px; object-fit: contain; background: #f9f9f9; padding: 16px; }
.product-info { padding: 12px; }
.product-category { font-size: 11px; color: #2563eb; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
.product-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #1a1a1a; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 36px; }
.product-price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.product-price { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.product-rating { font-size: 12px; color: #666; display: flex; align-items: center; gap: 3px; }
.discount-badge { display: inline-block; background: #fef2f2; color: #dc2626; font-size: 11px; border-radius: 4px; padding: 2px 6px; font-weight: 500; }
.add-btn { width: 100%; margin-top: 8px; padding: 7px; border: 1px solid #2563eb; border-radius: 8px; background: #eff6ff; color: #2563eb; font-size: 13px; cursor: pointer; transition: all 0.15s; font-weight: 500; }
.add-btn:hover { background: #2563eb; color: #fff; }
.loading { text-align: center; padding: 3rem; color: #888; font-size: 15px; }

/* PRODUCT DETAIL */
.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 13px; color: #555; cursor: pointer; margin-bottom: 1.5rem; background: #fff; transition: background 0.15s; }
.back-btn:hover { background: #f5f5f5; }
.product-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
@media (max-width: 640px) { .product-detail { grid-template-columns: 1fr; } }
.product-gallery { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 2rem; display: flex; align-items: center; justify-content: center; min-height: 320px; }
.product-gallery img { max-width: 100%; max-height: 280px; object-fit: contain; }
.thumbnails { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.thumbnails img { width: 60px; height: 60px; object-fit: contain; border-radius: 8px; border: 1px solid #e5e5e5; cursor: pointer; padding: 4px; background: #f9f9f9; transition: border-color 0.15s; }
.thumbnails img:hover { border-color: #2563eb; }
.product-meta h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.product-meta .category { color: #2563eb; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
.rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.stars { color: #f59e0b; font-size: 16px; }
.review-count { font-size: 13px; color: #666; }
.price-block { background: #f9fafb; border-radius: 8px; padding: 16px; margin-bottom: 14px; border: 1px solid #f0f0f0; }
.price-main { font-size: 28px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.price-original { font-size: 14px; color: #aaa; text-decoration: line-through; }
.price-save { font-size: 13px; color: #16a34a; font-weight: 600; }
.stock-info { font-size: 13px; margin-bottom: 12px; font-weight: 500; }
.stock-low { color: #d97706; }
.stock-ok { color: #16a34a; }
.product-desc { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 14px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.tag { background: #f0f4ff; border: 1px solid #dbeafe; border-radius: 999px; font-size: 12px; padding: 3px 10px; color: #2563eb; }
.qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.qty-label { font-size: 14px; color: #555; }
.qty-btn { width: 32px; height: 32px; border: 1px solid #e5e5e5; border-radius: 8px; background: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.qty-btn:hover { background: #f5f5f5; }
.qty-val { font-size: 15px; font-weight: 600; min-width: 24px; text-align: center; }
.add-to-cart-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2563eb; color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; transition: opacity 0.15s; }
.add-to-cart-btn:hover { opacity: 0.9; }
.specs-section { margin-top: 2rem; }
.specs-section h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.spec-item { background: #fff; border-radius: 8px; padding: 10px 14px; border: 1px solid #e5e5e5; }
.spec-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.spec-val { font-size: 14px; font-weight: 500; }
.reviews-section { margin-top: 1.5rem; }
.review-card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid #e5e5e5; }
.review-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.reviewer-name { font-weight: 500; font-size: 14px; }
.review-stars { color: #f59e0b; font-size: 13px; }
.review-text { font-size: 13px; color: #555; }

/* CART */
.cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
@media (max-width: 720px) { .cart-layout { grid-template-columns: 1fr; } }
.cart-items-section h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
.cart-item { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 14px; display: flex; gap: 14px; margin-bottom: 10px; }
.cart-item img { width: 72px; height: 72px; object-fit: contain; background: #f9f9f9; border-radius: 8px; padding: 6px; flex-shrink: 0; border: 1px solid #f0f0f0; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; line-height: 1.3; }
.cart-item-cat { font-size: 12px; color: #2563eb; margin-bottom: 8px; font-weight: 500; }
.cart-item-controls { display: flex; align-items: center; justify-content: space-between; }
.cart-qty { display: flex; align-items: center; gap: 8px; }
.cart-qty button { width: 28px; height: 28px; border: 1px solid #e5e5e5; border-radius: 6px; background: #f5f5f5; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.cart-qty button:hover { background: #e5e5e5; }
.cart-qty span { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
.cart-item-price { font-size: 15px; font-weight: 600; }
.remove-item { color: #dc2626; font-size: 12px; cursor: pointer; background: none; border: none; padding: 0; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
.remove-item:hover { text-decoration: underline; }
.empty-cart { text-align: center; padding: 3rem; color: #888; }
.empty-cart i { font-size: 48px; display: block; margin-bottom: 12px; color: #ccc; }
.browse-btn { margin-top: 14px; padding: 8px 20px; border: 1px solid #2563eb; border-radius: 8px; background: #eff6ff; color: #2563eb; cursor: pointer; font-size: 14px; font-weight: 500; }
.browse-btn:hover { background: #2563eb; color: #fff; }

/* BILL */
.bill-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; position: sticky; top: 72px; }
.bill-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
.bill-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 14px; color: #555; }
.bill-row.discount { color: #16a34a; font-weight: 500; }
.bill-row.total { font-size: 16px; font-weight: 700; color: #1a1a1a; border-top: 1px solid #e5e5e5; margin-top: 6px; padding-top: 12px; }
.checkout-btn { width: 100%; margin-top: 1rem; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.checkout-btn:hover { opacity: 0.9; }
.checkout-btn:disabled { background: #ccc; cursor: not-allowed; opacity: 1; }
.free-delivery-note { font-size: 12px; color: #16a34a; margin-top: 8px; text-align: center; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 14px; display: none; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="nav-logo" onclick="showPage('listing')">
    <i class="ti ti-shopping-bag"></i> ShopEase
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:13px;color:#888" id="nav-count"></span>
    <button class="cart-btn" onclick="showPage('cart')">
      <i class="ti ti-shopping-cart"></i>
      Cart
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
</nav>

<!-- LISTING PAGE -->
<div class="page active" id="page-listing">
  <div class="page-header">
    <h1>All Products</h1>
    <p id="product-count">Loading products…</p>
  </div>
  <div class="search-bar">
    <input type="text" placeholder="Search products…" id="search-input" oninput="filterProducts()">
    <select id="category-filter" onchange="filterProducts()">
      <option value="">All categories</option>
    </select>
    <select id="sort-filter" onchange="filterProducts()">
      <option value="">Sort by</option>
      <option value="price-asc">Price: low to high</option>
      <option value="price-desc">Price: high to low</option>
      <option value="rating">Top rated</option>
      <option value="discount">Best discount</option>
    </select>
  </div>
  <div class="products-grid" id="products-grid">
    <div class="loading">Loading products…</div>
  </div>
</div>

<!-- PRODUCT DETAIL PAGE -->
<div class="page" id="page-product">
  <button class="back-btn" onclick="showPage('listing')">
    <i class="ti ti-arrow-left"></i> Back to products
  </button>
  <div id="product-detail-content"></div>
</div>

<!-- CART PAGE -->
<div class="page" id="page-cart">
  <div class="page-header">
    <h1>Your cart</h1>
  </div>
  <div class="cart-layout">
    <div>
      <div class="cart-items-section">
        <h2 id="cart-items-title">Cart items</h2>
        <div id="cart-items-list"></div>
      </div>
    </div>
    <div>
      <div class="bill-card">
        <h2>Bill summary</h2>
        <div class="bill-row"><span>Subtotal (MRP)</span><span id="bill-subtotal">$0.00</span></div>
        <div class="bill-row discount"><span>Discount on MRP</span><span id="bill-discount">-$0.00</span></div>
        <div class="bill-row"><span>Delivery charges</span><span id="bill-delivery">FREE</span></div>
        <div class="bill-row total"><span>Total amount</span><span id="bill-total">$0.00</span></div>
        <button class="checkout-btn" id="checkout-btn" disabled onclick="checkout()">Proceed to checkout</button>
        <p class="free-delivery-note" id="delivery-note"></p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allProducts = [];
let cart = {};
let detailQty = 1;

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'cart') renderCart();
  window.scrollTo(0, 0);
}

function starsHtml(rating) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= Math.round(rating) ? '★' : '☆';
  return s;
}

async function loadProducts() {
  try {
    const res = await fetch('https://dummyjson.com/products?limit=194');
    const data = await res.json();
    allProducts = data.products;
    const cats = [...new Set(allProducts.map(p => p.category))].sort();
    const sel = document.getElementById('category-filter');
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c.charAt(0).toUpperCase() + c.slice(1).replace(/-/g, ' ');
      sel.appendChild(opt);
    });
    filterProducts();
  } catch (e) {
    document.getElementById('products-grid').innerHTML = '<div class="loading">Failed to load products. Check your connection.</div>';
  }
}

function filterProducts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('category-filter').value;
  const sort = document.getElementById('sort-filter').value;

  let filtered = allProducts.filter(p => {
    const matchQ = p.title.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
    const matchCat = !cat || p.category === cat;
    return matchQ && matchCat;
  });

  if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
  else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
  else if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);
  else if (sort === 'discount') filtered.sort((a, b) => b.discountPercentage - a.discountPercentage);

  document.getElementById('product-count').textContent = filtered.length + ' products';
  renderGrid(filtered);
}

function renderGrid(products) {
  const grid = document.getElementById('products-grid');
  if (!products.length) {
    grid.innerHTML = '<div class="loading">No products found.</div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="showProduct(${p.id})">
      <img class="product-img" src="${p.thumbnail}" alt="${p.title}" loading="lazy">
      <div class="product-info">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.title}</div>
        <div class="product-price-row">
          <span class="product-price">$${p.price.toFixed(2)}</span>
          <span class="product-rating"><span style="color:#f59e0b">★</span> ${p.rating.toFixed(1)}</span>
        </div>
        ${p.discountPercentage >= 5 ? `<span class="discount-badge">${Math.round(p.discountPercentage)}% off</span>` : ''}
        <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">
          + Add to cart
        </button>
      </div>
    </div>
  `).join('');
}

async function showProduct(id) {
  showPage('product');
  const container = document.getElementById('product-detail-content');
  container.innerHTML = '<div class="loading">Loading product details…</div>';
  detailQty = 1;

  try {
    const res = await fetch(`https://dummyjson.com/products/${id}`);
    const p = await res.json();

    const origPrice = (p.price / (1 - p.discountPercentage / 100)).toFixed(2);
    const savings = (parseFloat(origPrice) - p.price).toFixed(2);

    container.innerHTML = `
      <div class="product-detail">
        <div>
          <div class="product-gallery">
            <img id="main-img" src="${p.images && p.images[0] ? p.images[0] : p.thumbnail}" alt="${p.title}">
          </div>
          ${p.images && p.images.length > 1 ? `
            <div class="thumbnails">
              ${p.images.map(img => `
                <img src="${img}" alt="thumbnail" onclick="document.getElementById('main-img').src='${img}'">
              `).join('')}
            </div>
          ` : ''}
        </div>
        <div class="product-meta">
          <div class="category">${p.category}</div>
          <h1>${p.title}</h1>
          <div class="rating-row">
            <span class="stars">${starsHtml(p.rating)}</span>
            <span style="font-size:14px;font-weight:600">${p.rating.toFixed(1)}</span>
            <span class="review-count">(${p.reviews ? p.reviews.length : 0} reviews)</span>
          </div>
          <div class="price-block">
            <div class="price-main">
              $${p.price.toFixed(2)}
              <span class="discount-badge">${Math.round(p.discountPercentage)}% off</span>
            </div>
            <div>
              <span class="price-original">$${origPrice}</span>
              <span class="price-save">You save $${savings}</span>
            </div>
          </div>
          <div class="stock-info ${p.stock < 10 ? 'stock-low' : 'stock-ok'}">
            ${p.stock < 10 ? '⚠ Only ' + p.stock + ' left in stock!' : '✓ ' + p.stock + ' in stock'}
          </div>
          <p class="product-desc">${p.description}</p>
          ${p.tags && p.tags.length ? `
            <div class="tag-row">
              ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          ` : ''}
          <div class="qty-row">
            <span class="qty-label">Quantity:</span>
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-val" id="qty-display">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <button class="add-to-cart-btn" onclick="addToCart(${p.id}, detailQty)">
            <i class="ti ti-shopping-cart"></i> Add to cart
          </button>
        </div>
      </div>

      <div class="specs-section">
        <h2>Product details</h2>
        <div class="specs-grid">
          <div class="spec-item"><div class="spec-label">Brand</div><div class="spec-val">${p.brand || '—'}</div></div>
          <div class="spec-item"><div class="spec-label">SKU</div><div class="spec-val">${p.sku || '—'}</div></div>
          <div class="spec-item"><div class="spec-label">Weight</div><div class="spec-val">${p.weight ? p.weight + 'g' : '—'}</div></div>
          <div class="spec-item"><div class="spec-label">Availability</div><div class="spec-val">${p.availabilityStatus || '—'}</div></div>
          <div class="spec-item"><div class="spec-label">Min. order</div><div class="spec-val">${p.minimumOrderQuantity || 1}</div></div>
          <div class="spec-item"><div class="spec-label">Warranty</div><div class="spec-val">${p.warrantyInformation || '—'}</div></div>
        </div>
      </div>

      ${p.reviews && p.reviews.length ? `
        <div class="reviews-section">
          <h2 style="font-size:16px;font-weight:600;margin-bottom:12px">Customer reviews</h2>
          ${p.reviews.map(r => `
            <div class="review-card">
              <div class="review-header">
                <span class="reviewer-name">${r.reviewerName}</span>
                <span class="review-stars">${starsHtml(r.rating)}</span>
              </div>
              <p class="review-text">${r.comment}</p>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
  } catch (e) {
    container.innerHTML = '<div class="loading">Failed to load product. Please try again.</div>';
  }
}

function changeQty(delta) {
  detailQty = Math.max(1, detailQty + delta);
  const el = document.getElementById('qty-display');
  if (el) el.textContent = detailQty;
}

function addToCart(id, qty = 1) {
  const prod = allProducts.find(p => p.id === id);
  if (!prod) return;
  if (cart[id]) {
    cart[id].qty += qty;
  } else {
    cart[id] = { ...prod, qty };
  }
  updateCartUI();
  showToast(prod.title.length > 30 ? prod.title.slice(0, 30) + '…' : prod.title + ' added to cart');
}

function updateCartUI() {
  const total = Object.values(cart).reduce((s, p) => s + p.qty, 0);
  document.getElementById('cart-badge').textContent = total;
  document.getElementById('nav-count').textContent = total ? total + ' item' + (total > 1 ? 's' : '') : '';
}

function renderCart() {
  const items = Object.values(cart);
  const title = document.getElementById('cart-items-title');
  title.textContent = items.length ? items.length + ' item' + (items.length > 1 ? 's' : '') + ' in cart' : 'Cart items';

  const list = document.getElementById('cart-items-list');
  if (!items.length) {
    list.innerHTML = `
      <div class="empty-cart">
        <i class="ti ti-shopping-cart-off"></i>
        <p style="font-size:16px;font-weight:500;margin-bottom:6px">Your cart is empty</p>
        <p style="font-size:14px">Add items to get started</p>
        <button class="browse-btn" onclick="showPage('listing')">Browse products</button>
      </div>
    `;
    updateBill([]);
    return;
  }

  list.innerHTML = items.map(p => `
    <div class="cart-item">
      <img src="${p.thumbnail}" alt="${p.title}">
      <div class="cart-item-info">
        <div class="cart-item-name">${p.title}</div>
        <div class="cart-item-cat">${p.category}</div>
        <div class="cart-item-controls">
          <div class="cart-qty">
            <button onclick="updateCartQty(${p.id}, -1)">−</button>
            <span>${p.qty}</span>
            <button onclick="updateCartQty(${p.id}, 1)">+</button>
          </div>
          <span class="cart-item-price">$${(p.price * p.qty).toFixed(2)}</span>
        </div>
        <button class="remove-item" onclick="removeFromCart(${p.id})">
          <i class="ti ti-trash"></i> Remove
        </button>
      </div>
    </div>
  `).join('');

  updateBill(items);
}

function updateCartQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty = Math.max(1, cart[id].qty + delta);
  updateCartUI();
  renderCart();
}

function removeFromCart(id) {
  delete cart[id];
  updateCartUI();
  renderCart();
}

function updateBill(items) {
  const subtotal = items.reduce((s, p) => s + (p.price / (1 - p.discountPercentage / 100)) * p.qty, 0);
  const total = items.reduce((s, p) => s + p.price * p.qty, 0);
  const discount = subtotal - total;
  const delivery = total > 0 && total < 50 ? 4.99 : 0;
  const grandTotal = total + delivery;

  document.getElementById('bill-subtotal').textContent = '$' + subtotal.toFixed(2);
  document.getElementById('bill-discount').textContent = '-$' + discount.toFixed(2);
  document.getElementById('bill-delivery').textContent = delivery === 0 ? (total > 0 ? 'FREE' : '$0.00') : '$' + delivery.toFixed(2);
  document.getElementById('bill-total').textContent = '$' + grandTotal.toFixed(2);

  const note = document.getElementById('delivery-note');
  if (total > 0 && total < 50) {
    note.textContent = 'Add $' + (50 - total).toFixed(2) + ' more for free delivery!';
  } else if (total >= 50) {
    note.textContent = '🎉 You have free delivery!';
  } else {
    note.textContent = '';
  }

  const btn = document.getElementById('checkout-btn');
  btn.disabled = !items.length;
}

function checkout() {
  showToast('Order placed successfully! Thank you 🎉');
  cart = {};
  updateCartUI();
  setTimeout(() => { renderCart(); showPage('listing'); }, 1500);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

loadProducts();
</script>
</body>
</html>
